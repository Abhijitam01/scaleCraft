name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'apps/web/package-lock.json'
      - name: Install simulation-engine deps
        working-directory: packages/simulation-engine
        run: npm ci
      - name: Typecheck simulation-engine
        working-directory: packages/simulation-engine
        run: npm run check-types
      - name: Install web deps
        working-directory: apps/web
        run: npm ci
      - name: Typecheck web
        working-directory: apps/web
        run: npm run check-types

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'apps/web/package-lock.json'
      - name: Install simulation-engine deps
        working-directory: packages/simulation-engine
        run: npm ci
      - name: Lint simulation-engine
        working-directory: packages/simulation-engine
        run: npm run lint
      - name: Install web deps
        working-directory: apps/web
        run: npm ci
      - name: Lint web
        working-directory: apps/web
        run: npm run lint

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'apps/web/package-lock.json'
      - name: Install simulation-engine deps
        working-directory: packages/simulation-engine
        run: npm ci
      - name: Run simulation-engine tests with coverage
        working-directory: packages/simulation-engine
        run: npm run test:coverage
      - name: Install web deps
        working-directory: apps/web
        run: npm ci
      - name: Run web unit tests
        working-directory: apps/web
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'apps/web/package-lock.json'
      - name: Install simulation-engine deps
        working-directory: packages/simulation-engine
        run: npm ci
      - name: Build simulation-engine
        working-directory: packages/simulation-engine
        run: npm run build 2>/dev/null || npx tsc
      - name: Install web deps
        working-directory: apps/web
        run: npm ci
      - name: Build web
        working-directory: apps/web
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
      - name: Check bundle size
        working-directory: apps/web
        run: |
          BUILD_SIZE=$(du -sk .next | awk '{print $1}')
          echo "Build size: ${BUILD_SIZE}KB"
          # Warn if over 50MB (50000 KB)
          if [ "$BUILD_SIZE" -gt 50000 ]; then
            echo "WARNING: Build size ${BUILD_SIZE}KB exceeds 50MB threshold"
          fi

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'apps/web/package-lock.json'
      - name: Install simulation-engine deps
        working-directory: packages/simulation-engine
        run: npm ci
      - name: Install web deps
        working-directory: apps/web
        run: npm ci
      - name: Install Playwright browsers
        working-directory: apps/web
        run: npx playwright install chromium --with-deps
      - name: Run E2E tests
        working-directory: apps/web
        run: npm run test:e2e
        env:
          NEXT_TELEMETRY_DISABLED: '1'
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
